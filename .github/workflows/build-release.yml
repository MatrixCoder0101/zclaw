name: Build and Release ESP32 Firmware

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware (esp32)
        run: |
          . "$IDF_PATH/export.sh"
          idf.py \
            -B "build-esp32" \
            -D IDF_TARGET="esp32" \
            -D SDKCONFIG_DEFAULTS="sdkconfig.defaults" \
            build

      - name: Collect binaries
        run: |
          mkdir -p release-files

          cp build-esp32/zclaw.bin                              release-files/
          cp build-esp32/bootloader/bootloader.bin              release-files/
          cp build-esp32/partition_table/partition-table.bin    release-files/
          cp build-esp32/flash_args                             release-files/

      - name: Create Release and Upload Firmware
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            release-files/zclaw.bin
            release-files/bootloader.bin
            release-files/partition-table.bin
            release-files/flash_args
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}